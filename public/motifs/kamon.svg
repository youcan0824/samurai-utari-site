<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- 外円（二重円で家紋感） -->
  <circle cx="200" cy="200" r="180" stroke="currentColor" stroke-width="2.5" fill="none" />
  <circle cx="200" cy="200" r="170" stroke="currentColor" stroke-width="1" fill="none" opacity="0.5" />

  <!-- 縦縞（和紙の経線） -->
  <g stroke="currentColor" stroke-width="0.8" opacity="0.22">
    <line x1="200" y1="30" x2="200" y2="370" />
    <line x1="180" y1="35" x2="180" y2="365" />
    <line x1="220" y1="35" x2="220" y2="365" />
    <line x1="160" y1="45" x2="160" y2="355" />
    <line x1="240" y1="45" x2="240" y2="355" />
    <line x1="140" y1="60" x2="140" y2="340" />
    <line x1="260" y1="60" x2="260" y2="340" />
    <line x1="120" y1="80" x2="120" y2="320" />
    <line x1="280" y1="80" x2="280" y2="320" />
    <line x1="100" y1="110" x2="100" y2="290" />
    <line x1="300" y1="110" x2="300" y2="290" />
    <line x1="80" y1="140" x2="80" y2="260" />
    <line x1="320" y1="140" x2="320" y2="260" />
    <line x1="60" y1="175" x2="60" y2="225" />
    <line x1="340" y1="175" x2="340" y2="225" />
  </g>

  <!-- 五弁花（鋭角化した花びら・刀の切っ先風） -->
  <g transform="translate(200,200)">
    <g fill="currentColor">
      <!-- 花びら5枚（シャープな先端） -->
      <path d="M0,-8 L-12,-48 L0,-72 L12,-48 Z" />
      <g transform="rotate(72)"><path d="M0,-8 L-12,-48 L0,-72 L12,-48 Z" /></g>
      <g transform="rotate(144)"><path d="M0,-8 L-12,-48 L0,-72 L12,-48 Z" /></g>
      <g transform="rotate(216)"><path d="M0,-8 L-12,-48 L0,-72 L12,-48 Z" /></g>
      <g transform="rotate(288)"><path d="M0,-8 L-12,-48 L0,-72 L12,-48 Z" /></g>
    </g>

    <!-- 花びらの内側の陰影（深み） -->
    <g fill="#0d1117" opacity="0.25">
      <path d="M0,-12 L-5,-40 L0,-60 L5,-40 Z" />
      <g transform="rotate(72)"><path d="M0,-12 L-5,-40 L0,-60 L5,-40 Z" /></g>
      <g transform="rotate(144)"><path d="M0,-12 L-5,-40 L0,-60 L5,-40 Z" /></g>
      <g transform="rotate(216)"><path d="M0,-12 L-5,-40 L0,-60 L5,-40 Z" /></g>
      <g transform="rotate(288)"><path d="M0,-12 L-5,-40 L0,-60 L5,-40 Z" /></g>
    </g>

    <!-- 花芯の放射線（雄しべ風） -->
    <g stroke="currentColor" stroke-width="1.2" opacity="0.7">
      <line x1="0" y1="-8" x2="0" y2="-20" />
      <line x1="0" y1="-8" x2="0" y2="-20" transform="rotate(72)" />
      <line x1="0" y1="-8" x2="0" y2="-20" transform="rotate(144)" />
      <line x1="0" y1="-8" x2="0" y2="-20" transform="rotate(216)" />
      <line x1="0" y1="-8" x2="0" y2="-20" transform="rotate(288)" />
      <line x1="0" y1="-8" x2="0" y2="-20" transform="rotate(36)" />
      <line x1="0" y1="-8" x2="0" y2="-20" transform="rotate(108)" />
      <line x1="0" y1="-8" x2="0" y2="-20" transform="rotate(180)" />
      <line x1="0" y1="-8" x2="0" y2="-20" transform="rotate(252)" />
      <line x1="0" y1="-8" x2="0" y2="-20" transform="rotate(324)" />
    </g>

    <!-- 中央の花芯（朱色＝革命の切っ先） -->
    <circle cx="0" cy="0" r="10" fill="#8b2500" />
    <circle cx="0" cy="0" r="6" fill="currentColor" />
    <circle cx="0" cy="0" r="2.5" fill="#8b2500" />

    <!-- 葯（やく）のドット -->
    <g fill="currentColor">
      <circle cx="0" cy="-6" r="1.2" />
      <circle cx="0" cy="6" r="1.2" />
      <circle cx="-6" cy="0" r="1.2" />
      <circle cx="6" cy="0" r="1.2" />
    </g>
  </g>

  <!-- 葉（下部の左右に軽く） -->
  <g fill="currentColor" opacity="0.85">
    <path d="M120,240 Q110,260 125,280 Q145,270 140,250 Z" />
    <path d="M280,240 Q290,260 275,280 Q255,270 260,250 Z" />
  </g>
</svg>
