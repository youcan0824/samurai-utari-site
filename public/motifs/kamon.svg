<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 外円（細い二重円で家紋感） -->
  <circle cx="100" cy="100" r="88" stroke="currentColor" stroke-width="3" fill="none" />
  <circle cx="100" cy="100" r="78" stroke="currentColor" stroke-width="1" fill="none" opacity="0.6" />

  <!-- 刀身（縦に貫く・鋭い） -->
  <g fill="currentColor">
    <!-- 刀身本体 -->
    <path d="M95,28 L100,18 L105,28 L105,135 L95,135 Z" />
    <!-- 切っ先（朱色） -->
    <path d="M95,28 L100,18 L105,28 Z" fill="#8b2500" />
    <!-- 鍔（つば） -->
    <rect x="82" y="132" width="36" height="4" />
    <rect x="85" y="136" width="30" height="2" opacity="0.7" />
    <!-- 柄（つか・下部） -->
    <rect x="93" y="138" width="14" height="42" rx="1" />
  </g>

  <!-- 刀身の光沢（白い細線） -->
  <line x1="100" y1="30" x2="100" y2="131" stroke="currentColor" stroke-width="0.6" opacity="0" />
  <line
    x1="98"
    y1="35"
    x2="98"
    y2="128"
    stroke="#ffffff"
    stroke-width="0.8"
    opacity="0.35"
  />

  <!-- 柄の組紐（斜め交差） -->
  <g stroke="#e8dfc9" stroke-width="0.8" opacity="0.85">
    <line x1="93" y1="145" x2="107" y2="152" />
    <line x1="93" y1="152" x2="107" y2="145" />
    <line x1="93" y1="157" x2="107" y2="164" />
    <line x1="93" y1="164" x2="107" y2="157" />
    <line x1="93" y1="169" x2="107" y2="176" />
    <line x1="93" y1="176" x2="107" y2="169" />
  </g>

  <!-- 中央の小さな点（鍔の鋲） -->
  <circle cx="100" cy="134" r="1.2" fill="#8b2500" />
</svg>
