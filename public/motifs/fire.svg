<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 240" fill="#0a0a0a">
  <!-- 焚き火：薪 + 炎 -->
  <!-- 下部の薪（薪3つが交差） -->
  <g>
    <rect x="10" y="200" width="120" height="20" rx="10" />
    <rect x="25" y="185" width="90" height="18" rx="9" transform="rotate(-8 70 194)" />
    <rect x="25" y="205" width="90" height="16" rx="8" transform="rotate(6 70 213)" />
  </g>
  <!-- 炎（大きな渦巻く形） -->
  <path d="M70,20
           Q60,50 55,80
           Q45,110 50,140
           Q55,170 70,185
           Q85,170 90,140
           Q95,110 85,80
           Q80,50 70,20 Z" />
  <!-- 内側の炎の切り抜き（二重炎感） -->
  <path d="M70,55
           Q64,80 62,110
           Q65,140 70,160
           Q75,140 78,110
           Q76,80 70,55 Z"
        fill="#2a2a2a" opacity="0.8" />
  <!-- 炎のかすれ -->
  <g fill="#e8e8e8" opacity="0.25">
    <circle cx="55" cy="90" r="1.5" />
    <circle cx="85" cy="120" r="1" />
    <circle cx="60" cy="150" r="1.2" />
  </g>
</svg>
