<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" fill="none">
  <!-- 日本刀（打刀）の鋭いシルエット -->
  <!-- 柄（つか） -->
  <rect x="0" y="22" width="72" height="16" rx="2" fill="#0a0a0a" />
  <!-- 柄の組紐模様 -->
  <g stroke="#e8dfc9" stroke-width="1.5" opacity="0.9">
    <line x1="10" y1="22" x2="20" y2="38" />
    <line x1="20" y1="22" x2="30" y2="38" />
    <line x1="30" y1="22" x2="40" y2="38" />
    <line x1="40" y1="22" x2="50" y2="38" />
    <line x1="50" y1="22" x2="60" y2="38" />
  </g>
  <!-- 鍔（つば） -->
  <ellipse cx="76" cy="30" rx="6" ry="14" fill="#0a0a0a" />
  <!-- 刀身 -->
  <path d="M82,26
           L380,28
           L395,30
           L380,32
           L82,34
           Z"
        fill="#0a0a0a" />
  <!-- 刀身の光沢（白い細いライン） -->
  <path d="M82,28.5 L380,29.5 L390,30 L380,30.5 L82,31.5 Z"
        fill="#e8dfc9" opacity="0.4" />
  <!-- 切っ先の鋭さ強調 -->
  <path d="M380,28 L395,30 L380,32 Z" fill="#0a0a0a" />
</svg>
