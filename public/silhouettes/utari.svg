<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" fill="none">
  <!-- アイヌ・ニポポ人形風シルエット - 木彫り無骨 -->
  <g fill="#0a0a0a" stroke="#0a0a0a" stroke-linejoin="round">
    <!-- 頭（丸みを帯びた筒型） -->
    <path d="M60,40
             Q65,20 100,20
             Q135,20 140,40
             L138,100
             Q100,110 62,100 Z" />
    <!-- 頭の帯（アイヌの鉢巻・マタンプシ風） -->
    <path d="M58,70 L142,70 L142,80 L58,80 Z" fill="#1a1a1a" />
    <!-- 頭の中央の装飾（切り込み） -->
    <rect x="98" y="55" width="4" height="10" fill="#0d1117" />
    <!-- 首 -->
    <path d="M70,100 L68,120 L132,120 L130,100 Z" />
    <!-- 胴体（樽型・アットゥシの衣を纏った形） -->
    <path d="M50,120
             Q42,150 40,220
             Q38,280 42,340
             Q50,370 100,372
             Q150,370 158,340
             Q162,280 160,220
             Q158,150 150,120 Z" />
    <!-- 胴体中央の切り込み（木彫りの縦線） -->
    <path d="M100,125 L100,360" stroke="#1a1a1a" stroke-width="2" fill="none" />
    <!-- アイヌ文様（モレウ＝渦巻き）の抽象表現 -->
    <g fill="#1a1a1a">
      <!-- 上の模様 -->
      <path d="M70,160 Q85,155 90,170 Q95,180 85,185 Q75,185 72,175 Z" />
      <path d="M110,160 Q125,155 130,170 Q135,180 125,185 Q115,185 112,175 Z" />
      <!-- 下の模様 -->
      <path d="M65,280 Q80,275 85,290 Q88,300 78,303 Q68,302 65,293 Z" />
      <path d="M115,280 Q130,275 135,290 Q138,300 128,303 Q118,302 115,293 Z" />
      <!-- 中央のライン -->
      <path d="M80,225 L120,225 L120,230 L80,230 Z" />
    </g>
    <!-- 底部（土台） -->
    <path d="M40,365 L160,365 L165,380 L35,380 Z" />
  </g>
  <!-- かすれ・ノイズ感 -->
  <g fill="#0d1117" opacity="0.6">
    <circle cx="55" cy="180" r="1.5" />
    <circle cx="145" cy="200" r="2" />
    <circle cx="100" cy="250" r="1" />
    <circle cx="70" cy="320" r="1.5" />
    <rect x="150" y="280" width="3" height="1" />
    <rect x="60" y="140" width="2" height="1" />
  </g>
</svg>
