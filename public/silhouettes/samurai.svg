<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" fill="none">
  <!-- 侍の後ろ姿シルエット - 手描き風、無骨 -->
  <g fill="#0a0a0a" stroke="#0a0a0a" stroke-linejoin="round">
    <!-- 月代（頭の上部） -->
    <path d="M80,40 Q100,20 120,40 Q125,55 120,70 L80,70 Q75,55 80,40 Z" />
    <!-- 髷（まげ） -->
    <path d="M92,25 Q100,10 108,25 Q110,35 100,42 Q90,35 92,25 Z" />
    <!-- 首・襟元 -->
    <path d="M82,70 L78,95 Q100,105 122,95 L118,70 Z" />
    <!-- 肩〜胴体（着物の袖、ゆるやかな三角形） -->
    <path d="M78,95
             Q40,110 35,180
             Q32,200 38,215
             L60,205
             L65,150
             L80,130
             L82,95 Z" />
    <path d="M122,95
             Q160,110 165,180
             Q168,200 162,215
             L140,205
             L135,150
             L120,130
             L118,95 Z" />
    <!-- 胴体中央（背中） -->
    <path d="M78,95 L82,160 L78,260 L65,290 L80,300 L120,300 L135,290 L122,260 L118,160 L122,95 Z" />
    <!-- 袴（裾広がり） -->
    <path d="M65,290
             L50,380
             L60,395
             L95,390
             L100,300 Z" />
    <path d="M135,290
             L150,380
             L140,395
             L105,390
             L100,300 Z" />
    <!-- 刀（腰に差した日本刀） -->
    <g transform="rotate(-12, 100, 220)">
      <!-- 鞘 -->
      <path d="M55,210 L165,225 L170,232 L60,220 Z" fill="#1a1a1a" />
      <!-- 柄 -->
      <rect x="165" y="222" width="22" height="9" fill="#0a0a0a" />
      <!-- 鍔 -->
      <rect x="163" y="218" width="3" height="17" fill="#0a0a0a" />
    </g>
  </g>
  <!-- かすれ・ノイズ感（小さな欠け） -->
  <g fill="#0d1117" opacity="0.6">
    <circle cx="60" cy="150" r="2" />
    <circle cx="140" cy="175" r="1.5" />
    <circle cx="90" cy="250" r="1" />
    <circle cx="110" cy="320" r="2" />
    <rect x="70" y="200" width="3" height="1" />
    <rect x="130" y="240" width="2" height="1" />
  </g>
</svg>
