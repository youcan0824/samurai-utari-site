<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 32" fill="#123563">
  <!-- シンボル: 円 × 刀（革命の家紋） -->
  <g transform="translate(16,16)">
    <!-- 外円（二重） -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="#123563" stroke-width="1.6"/>
    <circle cx="0" cy="0" r="11.5" fill="none" stroke="#123563" stroke-width="0.5" opacity="0.5"/>

    <!-- 刀身（縦に貫く・鋭い） -->
    <path d="M-1.2,-13 L0,-15.5 L1.2,-13 L1.2,6 L-1.2,6 Z" fill="#123563"/>
    <!-- 切っ先（朱色） -->
    <path d="M-1.2,-13 L0,-15.5 L1.2,-13 Z" fill="#8b2500"/>
    <!-- 鍔（つば） -->
    <rect x="-4.5" y="5.5" width="9" height="1" fill="#123563"/>
    <!-- 柄（つか） -->
    <rect x="-1.5" y="7" width="3" height="9" fill="#123563"/>
    <!-- 柄の組紐（斜め） -->
    <line x1="-1.5" y1="9" x2="1.5" y2="10.5" stroke="#ffffff" stroke-width="0.5" opacity="0.7"/>
    <line x1="-1.5" y1="11" x2="1.5" y2="12.5" stroke="#ffffff" stroke-width="0.5" opacity="0.7"/>
    <line x1="-1.5" y1="13" x2="1.5" y2="14.5" stroke="#ffffff" stroke-width="0.5" opacity="0.7"/>
  </g>
  <!-- テキスト -->
  <text x="40" y="14" font-family="Arial, 'MS PGothic', sans-serif" font-size="9.5" font-weight="700" letter-spacing=".12em" fill="#123563">SAMURAI</text>
  <text x="40" y="26" font-family="Arial, 'MS PGothic', sans-serif" font-size="9.5" font-weight="700" letter-spacing=".12em" fill="#123563">UTARI</text>
</svg>
