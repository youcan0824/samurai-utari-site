<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 32" fill="#123563">
  <!-- シンボル: 藍の花紋（出藍の誉れ）+ 朱の花芯 -->
  <g transform="translate(16,16)">
    <!-- 外円 -->
    <circle cx="0" cy="0" r="13" fill="none" stroke="#123563" stroke-width="1.8"/>
    <circle cx="0" cy="0" r="11" fill="none" stroke="#123563" stroke-width="0.4" opacity="0.5"/>

    <!-- 五弁花（鋭角化） -->
    <g fill="#123563">
      <path d="M0,-3 L-3,-8 L0,-11 L3,-8 Z" />
      <path d="M0,-3 L-3,-8 L0,-11 L3,-8 Z" transform="rotate(72)"/>
      <path d="M0,-3 L-3,-8 L0,-11 L3,-8 Z" transform="rotate(144)"/>
      <path d="M0,-3 L-3,-8 L0,-11 L3,-8 Z" transform="rotate(216)"/>
      <path d="M0,-3 L-3,-8 L0,-11 L3,-8 Z" transform="rotate(288)"/>
    </g>

    <!-- 中央の花芯（朱色） -->
    <circle cx="0" cy="0" r="2" fill="#8b2500"/>
    <circle cx="0" cy="0" r="0.9" fill="#FFFFFF"/>
  </g>
  <!-- テキスト -->
  <text x="36" y="14" font-family="Arial, 'MS PGothic', sans-serif" font-size="9.5" font-weight="700" letter-spacing=".12em" fill="#123563">SAMURAI</text>
  <text x="36" y="26" font-family="Arial, 'MS PGothic', sans-serif" font-size="9.5" font-weight="700" letter-spacing=".12em" fill="#123563">UTARI</text>
</svg>
