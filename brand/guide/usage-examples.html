<\!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SAMURAI UTARI — Logo Usage Examples</title>
<link rel="stylesheet" href="colors.css">
<style>
  body { font-family: 'Noto Serif JP', serif; background: var(--color-washi); color: var(--color-indigo-deep); padding: 60px; }
  section { margin-bottom: 80px; }
  h1 { font-size: 32px; border-bottom: 2px solid var(--color-indigo); padding-bottom: 12px; }
  h2 { color: var(--color-indigo); font-size: 22px; }
  .logo-card { display: inline-block; margin: 16px 24px 16px 0; text-align: center; }
  .logo-card img { display: block; }
  .logo-card figcaption { font-size: 13px; color: var(--color-indigo-light); margin-top: 8px; }
  .bg-paper   { background: var(--color-washi); padding: 24px; }
  .bg-indigo  { background: var(--color-indigo); padding: 24px; }
  .bg-white   { background: #fff; padding: 24px; }
</style>
</head>
<body>
  <h1>SAMURAI UTARI — Logo Usage Examples</h1>

  <section>
    <h2>Primary on Paper / White / Indigo</h2>
    <figure class="logo-card"><div class="bg-paper">   <img src="../../public/logo/primary/logo-primary.png" width="160"></div><figcaption>Paper (和紙色)</figcaption></figure>
    <figure class="logo-card"><div class="bg-white">   <img src="../../public/logo/primary/logo-primary.png" width="160"></div><figcaption>White</figcaption></figure>
    <figure class="logo-card"><div class="bg-indigo">  <img src="../../public/logo/primary/logo-primary-mono.png" width="160" style="filter: invert(1);"></div><figcaption>On Indigo (inverted mono)</figcaption></figure>
  </section>

  <section>
    <h2>Scalability</h2>
    <figure class="logo-card"><img src="../../public/logo/primary/logo-primary.png" width="240"><figcaption>240px</figcaption></figure>
    <figure class="logo-card"><img src="../../public/logo/primary/logo-primary.png" width="120"><figcaption>120px</figcaption></figure>
    <figure class="logo-card"><img src="../../public/favicon/favicon-48.png" width="48"><figcaption>48px</figcaption></figure>
    <figure class="logo-card"><img src="../../public/favicon/favicon-32.png" width="32"><figcaption>32px</figcaption></figure>
    <figure class="logo-card"><img src="../../public/favicon/favicon-16.png" width="16"><figcaption>16px</figcaption></figure>
  </section>

  <section>
    <h2>With Company Name</h2>
    <figure class="logo-card"><img src="../../public/logo/primary/logo-primary-jp.png" width="280"><figcaption>日本語</figcaption></figure>
    <figure class="logo-card"><img src="../../public/logo/primary/logo-primary-en.png" width="280"><figcaption>English</figcaption></figure>
  </section>
</body>
</html>
